<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Report Links</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2310151C'/%3E%3Cpath d='M9 22V10h9M9 16h6' stroke='%230F9E97' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round' fill='none'/%3E%3C/svg%3E" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 20V6h11M6 13h7"/></svg>
        </div>
        <div>
          <h1>Report Links</h1>
          <p class="brand-sub">Directory · Data &amp; report links</p>
        </div>
      </div>

      <div class="topbar-actions">
        <span id="lastUpdated" class="last-updated"></span>

        <button id="roleToggleBtn" class="role-badge role-view">
          <span class="role-switch"><span class="role-switch-knob"></span></span>
          <span id="roleLabel">Viewer</span>
        </button>

        <button id="addCategoryBtn" class="btn btn-primary admin-only hidden">
          <span class="btn-icon">+</span> Add Category
        </button>
      </div>
    </div>
  </header>

  <main id="app">
    <div id="loadingState" class="state-msg">
      <div class="spinner"></div>
      <span>Syncing directory…</span>
    </div>
    <div id="errorState" class="state-msg error hidden"></div>
    <div id="emptyState" class="state-msg hidden">
      <div class="empty-icon">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M4 6h16M4 12h10M4 18h6"/></svg>
      </div>
      No categories logged yet.
    </div>
    <div id="categoriesContainer" class="categories-container"></div>
  </main>

  <!-- Add / Edit Link Modal -->
  <div id="linkModal" class="modal-backdrop hidden">
    <div class="modal">
      <h2 id="linkModalTitle">Add Link</h2>
      <form id="linkForm">
        <label>Title</label>
        <input type="text" id="linkTitleInput" placeholder="e.g. LDU Monitoring - July" required />

        <label>Google Sheet URL</label>
        <input type="url" id="linkUrlInput" placeholder="https://docs.google.com/spreadsheets/..." required />

        <label>Category</label>
        <select id="linkCategorySelect" required></select>

        <label>Status <span class="optional">(optional)</span></label>
        <select id="linkStatusSelect">
          <option value="">No status</option>
          <option value="Active">Active</option>
          <option value="Upcoming">Upcoming</option>
          <option value="Complete">Complete</option>
          <option value="Pending">Pending</option>
          <option value="Other">Other…</option>
        </select>
        <input type="text" id="linkStatusOtherInput" class="hidden" placeholder="Type a custom status" style="margin-top:8px;" />

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="linkCancelBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Add / Rename Category Modal -->
  <div id="categoryModal" class="modal-backdrop hidden">
    <div class="modal">
      <h2 id="categoryModalTitle">Add Category</h2>
      <form id="categoryForm">
        <label>Category Name</label>
        <input type="text" id="categoryNameInput" placeholder="e.g. BTL Team" required />
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="categoryCancelBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Confirm Delete Modal -->
  <div id="confirmModal" class="modal-backdrop hidden">
    <div class="modal">
      <h2 id="confirmTitle">Are you sure?</h2>
      <p id="confirmMessage" class="confirm-message"></p>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="confirmCancelBtn">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirmOkBtn">Delete</button>
      </div>
    </div>
  </div>

  <!-- Admin PIN Modal -->
  <div id="pinModal" class="modal-backdrop hidden">
    <div class="modal">
      <h2>Enter Admin PIN</h2>
      <form id="pinForm">
        <label>PIN</label>
        <input type="password" id="pinInput" placeholder="••••" inputmode="numeric" required />
        <p id="pinError" class="pin-error hidden">Incorrect PIN. Try again.</p>
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" id="pinCancelBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Unlock</button>
        </div>
      </form>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
